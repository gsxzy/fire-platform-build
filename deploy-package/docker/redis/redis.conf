# ============================================================================
# 新致远智慧消防平台 - Redis 7 生产配置
# 用途: 会话缓存、JWT Token 黑名单、设备在线状态、告警去重
# ============================================================================

# ── 基础设置 ──
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ── 内存管理 ──
# 最大内存 256MB，超过后使用 allkeys-lru 淘汰策略
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── 持久化 ──
# RDB 快照（适合快速恢复）
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF 持久化（适合高可靠性场景，IoT 数据不容丢失）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ── 安全 ──
# 生产环境必须设置密码
# requirepass 在 docker-compose 环境变量中注入
protected-mode no

# ── 客户端 ──
maxclients 10000

# ── 日志 ──
loglevel notice
logfile ""

# ── 慢查询 ──
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── 监控 ──
# 禁用危险命令（防止误操作删库）
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_b9e2f1a8"
