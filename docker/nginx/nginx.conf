# ============================================================================
# 新致远智慧消防平台 - 独立 Nginx 反向代理配置
# 用途: 作为统一入口，提供 SSL 终止、负载均衡、静态缓存
# 注意: 此配置用于独立的 Nginx 容器，前端镜像内置 Nginx 可省略此服务
# ============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式（JSON）
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"}';

    access_log /var/log/nginx/access.log json_combined;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    # 上游服务器
    upstream frontend_servers {
        server frontend:80;
        keepalive 32;
    }

    upstream backend_servers {
        least_conn;
        server backend:5003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP 重定向到 HTTPS ──
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS 主服务器 ──
    server {
        listen 443 ssl http2;
        server_name xzyzh.top www.xzyzh.top;

        # SSL 证书（生产环境需替换为真实证书）
        ssl_certificate /etc/nginx/ssl/xzyzh.top.crt;
        ssl_certificate_key /etc/nginx/ssl/xzyzh.top.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全响应头
        include /etc/nginx/security-headers.conf;

        # 健康检查
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}\n';
            add_header Content-Type application/json;
        }

        # 前端静态资源（带 hash 产物长期缓存）
        location ~* \.[a-f0-9]{8}\.(js|css)$ {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
            access_log off;
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, max-age=604800";
            expires 7d;
            access_log off;
        }

        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            include /etc/nginx/security-headers.conf;
        }

        # API 反向代理
        location /api/ {
            proxy_pass http://backend_servers/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket
        location /ws {
            proxy_pass http://backend_servers/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # WVP 视频流代理
        location /wvp/ {
            proxy_pass http://wvp:18080/;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
        }
    }
}
