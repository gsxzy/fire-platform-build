# ============================================================================
# 新致远智慧消防平台 - Nginx 生产配置
# 功能：静态资源服务 + 反向代理后端 API + WebSocket 支持 + 安全加固
# ============================================================================

user nginx-user;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── 基本设置 ──
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式（JSON 格式，便于 ELK/Loki 采集）
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── 性能优化 ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    client_body_buffer_size 16k;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── 速率限制（防止暴力破解和爬虫）──
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    # ── 上游后端服务 ──
    upstream backend_api {
        least_conn;
        server backend:5003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream backend_ws {
        server backend:5003;
        keepalive 32;
    }

    # ── 主服务器配置 ──
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── 静态资源缓存策略 ──
        # 带 hash 的构建产物（长期缓存）
        location ~* \.(js|css|woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # 图片资源（中等缓存）
        location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
            try_files $uri =404;
        }

        # 不缓存 HTML（确保前端路由和更新及时生效）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── 健康检查端点 ──
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"frontend"}\n';
            add_header Content-Type application/json;
        }

        # ── API 反向代理 ──
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass http://backend_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 超时设置（后端可能处理大数据导入导出）
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 错误处理：后端不可用时的降级响应
            proxy_intercept_errors on;
            error_page 502 503 504 = @backend_down;
        }

        # ── WebSocket 代理（实时告警推送）──
        location /ws {
            proxy_pass http://backend_ws/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── 视频流媒体代理（WVP-PRO / ZLM）──
        location /wvp/ {
            proxy_pass http://wvp:18080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
        }

        # ── 后端不可用降级页面 ──
        location @backend_down {
            access_log off;
            return 503 '{"code":503,"message":"后端服务暂时不可用，请稍后重试"}';
            add_header Content-Type application/json;
        }

        # ── 前端路由（HashRouter 模式，所有路由指向 index.html）──
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── 禁止访问敏感文件 ──
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~ \.(env|git|svn|htaccess|htpasswd) {
            deny all;
        }
    }
}
