# ═══════════════════════════════════════════════════════════════════
# 新致远智慧消防云平台 - Docker Compose 一键部署
# 
# 包含服务：
#   - MySQL 8.0 (数据库)
#   - Redis (缓存/消息队列)
#   - 后端API服务
#   - MQTT Broker (可选，IoT设备接入)
#
# 使用前请确保：
#   1. 复制 .env.example 为 .env 并填写所有必填项
#   2. 生成强密码替换默认值
#   3. 生产环境切勿使用默认密码
#
# 使用：docker-compose up -d
# ═══════════════════════════════════════════════════════════════════

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fire_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fire_platform}
      MYSQL_USER: ${DB_USER:-fire_user}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fire_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fire_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 前端Nginx服务
  frontend:
    image: nginx:alpine
    container_name: fire_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../app/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  mosquitto_data:

networks:
  default:
    name: fire_platform_network
