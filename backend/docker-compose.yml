# ═══════════════════════════════════════════════════════════════════
# 新致远智慧消防云平台 - Docker Compose 一键部署
#
# 三库架构：
#   - PostgreSQL 15 (业务主库)
#   - Redis 7 (缓存/会话/状态)
#   - TDengine 3.3 (时序数据库)
#   - 后端 API 服务 (Node.js + Express)
#   - 前端 Nginx 服务
#
# 使用前请确保：
#   1. 复制 .env.example 为 .env 并填写所有必填项
#   2. 生成强密码替换默认值
#   3. 生产环境切勿使用默认密码
#
# 使用：docker-compose up -d
# ═══════════════════════════════════════════════════════════════════

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fire_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-fire_platform}
      POSTGRES_USER: ${DB_USER:-fire_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Fire_Pass_2024!}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/baseline/V000__postgresql_baseline.sql:/docker-entrypoint-initdb.d/01-baseline.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fire_user} -d ${DB_NAME:-fire_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fire_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tdengine:
    image: tdengine/tdengine:3.3.6.6
    container_name: fire_tdengine
    restart: unless-stopped
    ports:
      - "6030:6030"
      - "6041:6041"
    volumes:
      - tdengine_data:/var/lib/taos
    healthcheck:
      test: ["CMD-SHELL", "taos -s 'SHOW DATABASES;' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fire_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tdengine:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 前端 Nginx 服务
  frontend:
    image: nginx:alpine
    container_name: fire_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ../app/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  tdengine_data:
  mosquitto_data:

networks:
  default:
    name: fire_platform_network
